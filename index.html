<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Minecraft</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: monospace; }
  #c { display: block; width: 100%; height: 100%; }

  /* 准星 */
  #crosshair {
    position: fixed; top: 50%; left: 50%; width: 22px; height: 22px;
    transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
  }
  #crosshair::before, #crosshair::after {
    content: ""; position: absolute; background: rgba(255,255,255,0.85);
    box-shadow: 0 0 2px rgba(0,0,0,0.8);
  }
  #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
  #crosshair::after  { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }
  /* 命中怪物时准星变红放大 */
  #crosshair.hit { transform: translate(-50%, -50%) scale(1.5); }
  #crosshair.hit::before, #crosshair.hit::after { background: #ff3030; }

  /* 热键栏 */
  #hotbar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; padding: 4px; background: rgba(0,0,0,0.45);
    border-radius: 6px; z-index: 10; pointer-events: none;
  }
  .slot {
    width: 48px; height: 48px; border: 2px solid rgba(255,255,255,0.25);
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    flex-direction: column; color: #fff; font-size: 10px; text-shadow: 1px 1px 0 #000;
  }
  .slot.active { border-color: #fff; background: rgba(255,255,255,0.15); }
  .slot.empty { opacity: 0.35; }
  .slot .sw { width: 26px; height: 26px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.4); position: relative; }
  /* 持有数量角标 */
  .slot .count {
    position: absolute; bottom: 1px; right: 2px; font-size: 12px; font-weight: bold;
    color: #fff; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000;
  }

  /* 提示信息 */
  #info {
    position: fixed; top: 12px; left: 12px; color: #fff; z-index: 10;
    text-shadow: 1px 1px 0 #000; font-size: 13px; line-height: 1.5; pointer-events: none;
  }
  #overlay {
    position: fixed; inset: 0; z-index: 20; display: flex; align-items: center;
    justify-content: center; background: rgba(0,0,0,0.7); color: #fff; cursor: pointer;
    flex-direction: column; text-align: center; gap: 12px;
  }
  #overlay h1 { font-size: 36px; letter-spacing: 2px; }
  #overlay p { font-size: 15px; line-height: 1.8; opacity: 0.9; }
  #overlay .start { margin-top: 8px; padding: 10px 24px; border: 2px solid #fff; border-radius: 6px; font-size: 16px; }
  /* 血量条 */
  #health {
    position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 2px; z-index: 10; pointer-events: none;
  }
  #health .heart {
    width: 22px; height: 22px; font-size: 18px; line-height: 22px; text-align: center;
    filter: drop-shadow(1px 1px 0 #000);
  }
  /* 饥饿条（血条右侧对称位置）*/
  #hunger {
    position: fixed; bottom: 72px; left: 50%; transform: translateX(120px);
    display: flex; gap: 2px; z-index: 10; pointer-events: none;
  }
  #hunger .drum {
    width: 20px; height: 22px; font-size: 16px; line-height: 22px; text-align: center;
    filter: drop-shadow(1px 1px 0 #000);
  }
  /* 受伤红屏闪烁 */
  #hurt {
    position: fixed; inset: 0; z-index: 15; pointer-events: none;
    background: radial-gradient(circle, transparent 40%, rgba(180,0,0,0.55) 100%);
    opacity: 0; transition: opacity 0.1s;
  }
  #hurt.flash { opacity: 1; }
  /* 死亡屏 */
  #death {
    position: fixed; inset: 0; z-index: 25; display: flex; align-items: center;
    justify-content: center; flex-direction: column; gap: 16px; cursor: pointer;
    background: rgba(80,0,0,0.55); color: #fff; text-align: center;
  }
  #death h1 { font-size: 40px; letter-spacing: 2px; }
  #death .respawn { padding: 10px 24px; border: 2px solid #fff; border-radius: 6px; font-size: 16px; }
  /* 合成面板 */
  #craft {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 22; background: rgba(20,20,30,0.94); border: 2px solid #555;
    border-radius: 8px; padding: 16px; color: #fff; width: 340px; max-height: 70vh; overflow-y: auto;
  }
  #craft h2 { font-size: 18px; margin-bottom: 4px; }
  #craft .hint { font-size: 11px; opacity: 0.6; margin-bottom: 10px; }
  #craft .recipe {
    display: flex; align-items: center; gap: 8px; padding: 6px; border-radius: 4px;
    margin-bottom: 4px; cursor: pointer; border: 1px solid transparent;
  }
  #craft .recipe.ok { background: rgba(80,160,80,0.18); border-color: rgba(120,200,120,0.4); }
  #craft .recipe.no { opacity: 0.4; cursor: not-allowed; }
  #craft .recipe .sw { width: 20px; height: 20px; border-radius: 3px; border: 1px solid #000; }
  #craft .recipe .txt { font-size: 12px; flex: 1; }
  #craft .recipe .need { font-size: 10px; opacity: 0.7; }
  /* 伤害飘字 */
  .dmgtext {
    position: fixed; z-index: 18; pointer-events: none; font-weight: bold; font-size: 22px;
    color: #fff; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000; transition: none;
  }
  .dmgtext.hurt { color: #ff5050; font-size: 26px; }
  /* 经验条 */
  #xpbar {
    position: fixed; bottom: 66px; left: 50%; transform: translateX(-50%);
    width: 280px; height: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; z-index: 10;
    pointer-events: none; overflow: visible;
  }
  #xpfill { height: 100%; width: 0%; background: linear-gradient(90deg,#7ed957,#3ec70a); border-radius: 4px; transition: width 0.2s; }
  #xptext {
    position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
    color: #7ed957; font-size: 12px; font-weight: bold; text-shadow: 1px 1px 0 #000;
  }
  /* 临时提示（存档等）*/
  #hint {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    color: #fff; background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 6px;
    z-index: 19; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  #hint.show { opacity: 1; }
  /* 标题界面的种子输入与按钮 */
  #overlay .seedrow { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
  #overlay input { padding: 8px 12px; border-radius: 6px; border: 1px solid #888; background: #222; color: #fff; font-size: 14px; width: 160px; }
  #overlay .btn { padding: 8px 16px; border: 2px solid #fff; border-radius: 6px; font-size: 14px; cursor: pointer; }
  #overlay .btn:hover { background: rgba(255,255,255,0.15); }
  /* 箱子面板 */
  #chest {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 22; background: rgba(20,20,30,0.94); border: 2px solid #555;
    border-radius: 8px; padding: 16px; color: #fff; width: 460px;
  }
  #chest h2 { font-size: 18px; margin-bottom: 4px; }
  #chest .hint { font-size: 11px; opacity: 0.6; margin-bottom: 10px; }
  #chest .chestrow { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  #chest .chestrow b { width: 40px; font-size: 12px; }
  #chest .chestrow > div { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; }
  #chest .cslot {
    width: 40px; height: 40px; border: 1px solid #555; border-radius: 4px; position: relative;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  #chest .cslot .sw { width: 24px; height: 24px; border-radius: 3px; border: 1px solid #000; }
  #chest .cslot .cnt { position: absolute; bottom: 0; right: 2px; font-size: 11px; font-weight: bold; text-shadow: 1px 1px 0 #000; }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="crosshair"></div>
  <div id="info"></div>
  <div id="hotbar"></div>
  <div id="health"></div>
  <div id="hunger"></div>
  <div id="xpbar"><div id="xpfill"></div><span id="xptext"></span></div>
  <div id="hint"></div>
  <div id="hurt"></div>
  <div id="chest" class="hidden">
    <h2>📦 箱子</h2>
    <div class="hint">点击箱子格取出 · 点击背包格存入 · E 关闭</div>
    <div class="chestrow"><b>箱子</b><div id="chestSlots"></div></div>
    <div class="chestrow"><b>背包</b><div id="chestInv"></div></div>
  </div>
  <div id="craft" class="hidden">
    <h2>🔨 合成</h2>
    <div class="hint">E 打开/关闭 · 灰色配方需靠近工作台 · 点击合成</div>
    <div id="craftList"></div>
  </div>
  <div id="death" class="hidden">
    <h1>💀 你死了</h1>
    <div class="respawn">点击复活</div>
  </div>
  <div id="overlay">
    <h1>⛏ Mini Minecraft</h1>
    <p>
      WASD 移动 · 鼠标 视角 · 空格 跳跃 · Shift 下蹲<br>
      左键 破坏/攻击 · 右键 放置/开门开箱<br>
      数字键/滚轮 切换方块 · E 合成 · Q 吃东西 · K 存档 · ESC 释放鼠标
    </p>
    <div class="start">点击开始</div>
    <div class="seedrow">
      <input id="seedInput" type="text" placeholder="世界种子（可留空）">
      <div class="btn" id="newGameBtn">新世界</div>
    </div>
    <p style="font-size:12px;opacity:0.6">有存档会自动继续；点「新世界」用种子重开（会覆盖存档）</p>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
  <script type="module" src="./src/game.js"></script>
</body>
</html>
